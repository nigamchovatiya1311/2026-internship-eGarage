<!-- ── Toast (required by showToast in admin_dashboard.js) ── -->
<div id="toast" class="toast">
  <i id="toastIcon" class="fas fa-check-circle"></i>
  <span id="toastMsg"></span>
</div>

<!-- User Modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-user-circle"></i> User Details</h3>
      <button class="modal-close" onclick="closeModal('userModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="userModalBody"></div>
    <div class="modal-footer">
      <button class="btn-modal-secondary" onclick="closeModal('userModal')">Close</button>
    </div>
  </div>
</div>

<!-- Provider Modal -->
<div class="modal-overlay" id="providerModal">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-store"></i> Provider Details</h3>

  </div>
</div>

<!-- Customer / Vehicle Modal -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-car"></i> Vehicle Details</h3>
      <button class="modal-close" onclick="closeModal('customerModal')"><i class="fas fa-times"></i></button>

<!-- Booking Modal -->
<div class="modal-overlay" id="bookingModal">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-calendar-check"></i> Booking Details</h3>
      <button class="modal-close" onclick="closeModal('bookingModal')"><i class="fas fa-times"></i></button>

    </div>
  </div>

<!-- Add / Edit Service Modal -->
<div class="modal-overlay" id="serviceModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="serviceModalTitle"><i class="fas fa-tags"></i> Add Service</h3>
      <button class="modal-close" onclick="closeModal('serviceModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group-modal">
        <label>Service Name</label>
        <input type="text" id="svcName" placeholder="e.g. Oil Change & Lube"/>
      </div>
      <div class="form-group-modal">
        <label>Provider</label>
        <input type="text" id="svcProvider" placeholder="Provider name"/>
      </div>
      <div class="form-group-modal">
        <label>Description</label>
        <textarea id="svcDesc" rows="2" placeholder="Short description..."></textarea>
      </div>
      <div class="form-row-modal">
        <div class="form-group-modal">
          <label>Price (₹)</label>
          <input type="number" id="svcPrice" placeholder="1999"/>
        </div>
        <div class="form-group-modal">
          <label>Duration (mins)</label>
          <input type="number" id="svcDuration" placeholder="45"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-secondary" onclick="closeModal('serviceModal')">Cancel</button>
      <button class="btn-modal-primary" onclick="saveService()">Save Service</button>
    </div>
  </div>
</div>

<!-- Send Notification Modal -->
<div class="modal-overlay" id="notifModal">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-paper-plane"></i> Send Notification</h3>
      <button class="modal-close" onclick="closeModal('notifModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group-modal">
        <label>Recipient</label>
        <select id="notifUser" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;outline:none;font-family:inherit;font-size:0.88rem">
          <option value="all">All Users</option>
        </select>
      </div>
      <div class="form-group-modal">
        <label>Type</label>
        <select id="notifType" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;outline:none;font-family:inherit;font-size:0.88rem">
          <option>general</option><option>booking_confirmed</option>
          <option>payment_received</option><option>service_completed</option><option>booking_cancelled</option>
        </select>
      </div>
      <div class="form-group-modal">
        <label>Title</label>
        <input type="text" id="notifTitle" placeholder="Notification title"/>
      </div>
      <div class="form-group-modal">
        <label>Message</label>
        <textarea id="notifMsg" rows="3" placeholder="Enter your message..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-secondary" onclick="closeModal('notifModal')">Cancel</button>
      <button class="btn-modal-primary" onclick="sendNotification()">Send</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal modal-sm">
    <div class="modal-header danger-header">
      <h3><i class="fas fa-trash"></i> Confirm Delete</h3>
      <button class="modal-close" onclick="closeModal('deleteModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <!-- id="deleteMsg" is what admin_dashboard.js confirmDelete() writes to -->
      <p id="deleteMsg">Are you sure you want to delete this item?</p>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-secondary" onclick="closeModal('deleteModal')">Cancel</button>
      <!-- id="deleteConfirmBtn" is wired dynamically by confirmDelete() -->
      <button class="btn-modal-danger" id="deleteConfirmBtn">Delete</button>
    </div>
  </div>
</div>
